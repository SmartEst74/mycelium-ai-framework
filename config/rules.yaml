# Immutable Rules — Mycelium AI Framework

rules:
  financial:
    - NEVER spend money without Jon's explicit approval
    - Revenue first. Always ask: "Does this make money?"
    - Free tier only for all models, tools, and services
    - If a tool costs money, find a free alternative first

  models:
    - NEVER downgrade models without Jon's approval
    - Only upgrade with PROOF (benchmark, test results)
    - Keep benchmarks current (test monthly minimum)
    - If primary model becomes unavailable, alert Jon immediately
    - Mycelium uses mimo-v2-pro (brain needs memory, not eyes)
    - Dynamic Ants use mimo-v2-omni (ants ARE the eyes and hands)
    - Scout uses step-3.5-flash (fast probing, never executes)

  architecture:
    - Mycelium NEVER executes side-effects (delegation only)
    - Mycelium NEVER uses vision (ants see, brain routes)
    - Scout NEVER executes (research only)
    - Army Ants build teams (don't do the work)
    - Dynamic Ants do focused work (one task, one role, one model)
    - Each layer reports UP to Mycelium via shared memory
    - No agent talks sideways — everything goes through shared memory

  enforcement:
    description: >
      These rules are enforced by git hooks and validation scripts.
      Violations cause commit failures or write rejections. Not suggestions.
    chain_of_command:
      - Mycelium THINKS, PLANS, ORCHESTRATES. It does NOT execute leaf work.
      - If the main agent is doing the work itself, it is VIOLATING the chain.
      - Main agent delegates → Scouts explore → Generals execute → Main agent remembers.
    file_placement:
      description: "WHERE content goes determines IF it can be found later."
      project_docs:
        target: "project repository (e.g., SmartEst74/<project>/docs/)"
        examples: ["SRE plans", "architecture docs", "design docs", "specs", "RFCs", "roadmaps"]
        NOT_in: "shared memory (memory/)"
      colony_knowledge:
        target: "memory/YYYY-MM-DD.md with proper tags"
        tags:
          reusable_knowledge: "#lesson"
          friction_gotcha: "#pain-point"
          efficiency_pattern: "#shortcut"
          revenue_opportunity: "#green-leaf"
          model_benchmark: "#benchmark"
          system_state: "#durable-state"
      mission_tracking:
        target: "memory/YYYY-MM-DD.md with tags"
        tags:
          active_work: "#mission"
          completed_work: "#mission-complete"
      main_memory:
        rule: "Only the Mycelium (main agent) updates MEMORY.md after review."
        forbidden: "Sub-agents must NEVER write to MEMORY.md directly."
      temp_files:
        target: "/tmp or workspace/tmp"
        NOT_in: "shared memory (memory/)"
    enforcement_hooks:
      pre_commit: ".git/hooks/pre-commit — blocks violations at commit time"
      validate_write: "scripts/validate-write.sh — advisory check before writing"

  memory:
    - ALL agents read shared memory BEFORE starting work
    - ALL agents write to shared memory DURING and AFTER work
    - Dynamic Ants write #mission when starting
    - Dynamic Ants write #mission-complete when done (with results)
    - Dynamic Ants write #pain-point when blocked
    - Dynamic Ants write #shortcut when they find a better way
    - Scout writes #green-leaf for every revenue opportunity
    - Scout writes #benchmark after every model test
    - Mycelium writes #durable-state on every heartbeat
    - NEVER lose a lesson. If something went wrong, capture the fix.

  shared-memory-health:
    - Colony is HEALTHY when:
      * #mission entries have recent timestamps
      * #mission-complete entries outnumber #mission
      * #pain-point entries are being addressed
      * #green-leaf entries exist (revenue being hunted)
      * #benchmark entries are recent
    - Colony is SICK when:
      * #mission entries go stale (>30 min no update)
      * #pain-point entries accumulate without #lesson resolutions
      * No #green-leaf in 24h (revenue hunt stopped)
      * No #benchmark in 7 days (model quality unchecked)
    - Mycelium checks colony health on every heartbeat

  environment:
    - Check system health every 15 minutes (Mother Brain)
    - Disk > 85% = ALERT. Disk > 95% = CRITICAL CLEANUP.
    - Gateway must always be running
    - Cron jobs must always be healthy
    - Model availability must be verified regularly

  improvement:
    - CONSTANT SELF-IMPROVEMENT is mandatory, not optional
    - Every cycle: find one thing to improve
    - When Jon looks at the colony, he should see ACTIVE work
    - Never sit idle. Find the work. Do the work.
